<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ Avión vs Misiles</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 100vh;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: lime;
            font-size: 22px;
            z-index: 10;
            text-shadow: 0 0 5px black;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 52px;
            text-align: center;
            display: none;
            z-index: 20;
            text-shadow: 0 0 15px red;
        }
        .touch-btn {
            position: absolute;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 32px;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div id="ui">
        Puntaje: <span id="score">0</span> &nbsp;&nbsp;&nbsp; 
        Vidas: <span id="lives">3</span>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div id="gameOver">
        GAME OVER<br>
        <span style="font-size:36px">Puntaje final: <span id="finalScore">0</span></span><br><br>
        Toca la pantalla para jugar de nuevo
    </div>

    <div id="shootBtn" class="touch-btn" style="bottom: 35px; right: 25px;">🔫</div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        
        const scoreEl = document.getElementById("score");
        const livesEl = document.getElementById("lives");
        const gameOverScreen = document.getElementById("gameOver");
        const finalScoreEl = document.getElementById("finalScore");
        const shootBtn = document.getElementById("shootBtn");

        let score = 0, lives = 3, gameOver = false, difficulty = 1;

        const player = { x: 370, y: 480, width: 60, height: 50, speed: 8 };

        let bullets = [], missiles = [], enemies = [], explosions = [], keys = {};

        // Joystick mejorado
        let isTouching = false;
        let touchX = 0, touchY = 0;
        let joystickActive = false;
        const joystickX = 150;
        const joystickY = 460;
        const joystickRadius = 85;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = 'sine', volume = 0.3) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                gain.gain.value = volume;
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                setTimeout(() => osc.stop(), duration);
            } catch(e) {}
        }

        // Controles teclado
        window.addEventListener("keydown", e => {
            keys[e.key] = true;
            if (e.key === " " && !gameOver) shoot();
            if (e.key.toLowerCase() === "r" && gameOver) resetGame();
        });
        window.addEventListener("keyup", e => keys[e.key] = false);

        // Controles táctiles
        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return {
                x: (t.clientX - rect.left) * (canvas.width / rect.width),
                y: (t.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        canvas.addEventListener("touchstart", e => {
            e.preventDefault();
            if (gameOver) { resetGame(); return; }

            const pos = getTouchPos(e);
            touchX = pos.x; touchY = pos.y;
            isTouching = true;

            if (Math.hypot(pos.x - joystickX, pos.y - joystickY) < joystickRadius * 1.7) {
                joystickActive = true;
            }
        });

        canvas.addEventListener("touchmove", e => {
            e.preventDefault();   // Muy importante
            if (!isTouching || gameOver) return;
            const pos = getTouchPos(e);
            touchX = pos.x;
            touchY = pos.y;
        });

        canvas.addEventListener("touchend", () => {
            isTouching = false;
            joystickActive = false;
        });

        // Botón disparo
        shootBtn.addEventListener("touchstart", e => { e.preventDefault(); if (!gameOver) shoot(); });
        shootBtn.addEventListener("mousedown", () => { if (!gameOver) shoot(); });

        function shoot() {
            bullets.push({ x: player.x + 28, y: player.y - 10, width: 8, height: 25, speed: 13 });
            playSound(820, 70, 'square', 0.35);
        }

        // ====================== RESTO DEL JUEGO ======================
        function createMissile(x, y, speed = 4.5) {
            missiles.push({ x, y, width: 18, height: 38, speed });
        }

        function createEnemy() {
            const fromLeft = Math.random() < 0.5;
            enemies.push({
                x: fromLeft ? -60 : canvas.width + 60,
                y: 60 + Math.random() * 180,
                width: 55, height: 40,
                speed: 2.8 + Math.random() * 2,
                direction: fromLeft ? 1 : -1,
                shootTimer: 40 + Math.random() * 60
            });
        }

        function createExplosion(x, y, size = 1) {
            explosions.push({ x, y, size, life: 28 });
            playSound(150, 280, 'sawtooth', 0.7);
            setTimeout(() => playSound(70, 350, 'sawtooth', 0.4), 80);
        }

        function checkCollision(a, b) {
            return !(a.x + a.width < b.x || b.x + b.width < a.x || a.y + a.height < b.y || b.y + b.height < a.y);
        }

        function drawPlane(x, y, color = "#00ff88") {
            ctx.fillStyle = color;
            ctx.fillRect(x+15, y, 30, 35);
            ctx.fillRect(x+25, y-15, 12, 20);
            ctx.fillRect(x+5, y+18, 20, 12);
            ctx.fillRect(x+35, y+18, 20, 12);
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(x+27, y+6, 7, 10);
        }

        function drawMissile(x, y) {
            ctx.fillStyle = "#ff2222";
            ctx.fillRect(x+4, y, 12, 34);
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(x+6, y-10, 8, 14);
            ctx.fillStyle = "#ff8800";
            ctx.fillRect(x+7, y+28, 6, 10);
        }

        function drawExplosion(exp) {
            const alpha = exp.life / 28;
            ctx.globalAlpha = alpha * 0.9;
            const s = exp.size * (28 + Math.sin(exp.life*0.8)*12);
            ctx.fillStyle = `hsl(25, 100%, 60%)`;
            ctx.fillRect(exp.x - s/2, exp.y - s/2, s, s);
            ctx.globalAlpha = 1;
        }

        function update() {
            if (gameOver) return;

            // Teclado
            if (keys["ArrowLeft"]) player.x -= player.speed;
            if (keys["ArrowRight"]) player.x += player.speed;
            if (keys["ArrowUp"]) player.y -= player.speed;
            if (keys["ArrowDown"]) player.y += player.speed;

            // Joystick táctil - Versión más sensible
            if (joystickActive && isTouching) {
                let dx = touchX - joystickX;
                let dy = touchY - joystickY;
                let dist = Math.hypot(dx, dy);

                if (dist > 20) {
                    let moveSpeed = player.speed * 1.1;
                    player.x += (dx / dist) * moveSpeed * 1.15;   // más fuerza horizontal
                    player.y += (dy / dist) * moveSpeed * 0.9;
                }
            }

            // Limitar jugador
            player.x = Math.max(15, Math.min(canvas.width - player.width - 15, player.x));
            player.y = Math.max(20, Math.min(canvas.height - player.height - 20, player.y));

            // Actualizar balas, misiles, etc. (mismo código que antes)
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < -30) bullets.splice(i, 1);
            }

            for (let i = missiles.length - 1; i >= 0; i--) {
                missiles[i].y += missiles[i].speed;
                if (checkCollision(player, missiles[i])) {
                    lives--; livesEl.textContent = lives;
                    createExplosion(player.x + 30, player.y + 25, 1.6);
                    missiles.splice(i, 1);
                    if (lives <= 0) endGame();
                    continue;
                }
                if (missiles[i].y > canvas.height + 50) missiles.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.speed * e.direction;
                e.shootTimer--;
                if (e.shootTimer <= 0) {
                    createMissile(e.x + 23, e.y + e.height, 4.2 + difficulty * 0.6);
                    e.shootTimer = 45 + Math.random() * 65;
                }
                if (e.x < -80 || e.x > canvas.width + 80) enemies.splice(i, 1);
            }

            // Colisiones bala
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                for (let j = missiles.length - 1; j >= 0; j--) {
                    if (checkCollision(b, missiles[j])) {
                        createExplosion(missiles[j].x + 9, missiles[j].y + 18);
                        bullets.splice(i, 1); missiles.splice(j, 1);
                        score += 10; scoreEl.textContent = score;
                        break;
                    }
                }
                if (i < 0) continue;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (checkCollision(b, enemies[j])) {
                        createExplosion(enemies[j].x + 27, enemies[j].y + 20, 1.3);
                        bullets.splice(i, 1); enemies.splice(j, 1);
                        score += 30; scoreEl.textContent = score;
                        break;
                    }
                }
            }

            for (let i = explosions.length - 1; i >= 0; i--) {
                if (--explosions[i].life <= 0) explosions.splice(i, 1);
            }

            difficulty = 1 + Math.floor(score / 200) * 0.35;

            if (Math.random() < 0.025 + difficulty * 0.013) createEnemy();
            if (Math.random() < 0.042 + difficulty * 0.02) {
                createMissile(Math.random() * (canvas.width - 40), -40, 3.8 + difficulty);
            }
        }

        function draw() {
            ctx.fillStyle = "#001122";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ffffff";
            for (let i = 0; i < 45; i++) {
                ctx.fillRect((i*67)%800, (i*41)%380, 1.5, 1.5);
            }

            drawPlane(player.x, player.y, "#00ff88");
            bullets.forEach(b => { ctx.fillStyle = "#00ffff"; ctx.fillRect(b.x, b.y, b.width, b.height); });
            missiles.forEach(m => drawMissile(m.x, m.y));
            enemies.forEach(e => drawPlane(e.x, e.y, "#ff5555"));
            explosions.forEach(drawExplosion);

            // Joystick visual
            if (joystickActive) {
                ctx.strokeStyle = "rgba(0,255,100,0.4)";
                ctx.lineWidth = 14;
                ctx.beginPath();
                ctx.arc(joystickX, joystickY, joystickRadius, 0, Math.PI*2);
                ctx.stroke();

                const dx = touchX - joystickX;
                const dy = touchY - joystickY;
                const dist = Math.min(Math.hypot(dx, dy), joystickRadius);
                const angle = Math.atan2(dy, dx);
                const sx = joystickX + Math.cos(angle) * dist;
                const sy = joystickY + Math.sin(angle) * dist;

                ctx.fillStyle = "rgba(0,255,100,0.7)";
                ctx.beginPath();
                ctx.arc(sx, sy, 32, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function endGame() {
            gameOver = true;
            createExplosion(player.x + 30, player.y + 25, 2);
            gameOverScreen.style.display = "block";
            finalScoreEl.textContent = score;
        }

        function resetGame() {
            score = 0; lives = 3; difficulty = 1;
            bullets = []; missiles = []; enemies = []; explosions = [];
            player.x = 370; player.y = 480;
            gameOver = false;
            gameOverScreen.style.display = "none";
            scoreEl.textContent = "0";
            livesEl.textContent = "3";
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        resetGame();
        gameLoop();
    </script>
</body>
</html>
