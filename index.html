<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Avión vs Misiles - Versión Mejorada</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 3px solid #0f0;
            box-shadow: 0 0 20px #0f0;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: lime;
            font-size: 24px;
            pointer-events: none;
        }
        #gameOver {
            position: absolute;
            color: red;
            font-size: 60px;
            display: none;
            text-align: center;
            text-shadow: 0 0 10px red;
        }
    </style>
</head>
<body>
    <div id="ui">
        Puntaje: <span id="score">0</span> &nbsp;&nbsp; 
        Vidas: <span id="lives">3</span>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>

    <div id="gameOver">
        GAME OVER<br>
        <span style="font-size:35px">Puntaje final: <span id="finalScore">0</span></span><br><br>
        Presiona <strong>R</strong> para jugar de nuevo
    </div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const livesEl = document.getElementById("lives");
        const gameOverScreen = document.getElementById("gameOver");
        const finalScoreEl = document.getElementById("finalScore");

        let score = 0;
        let lives = 3;
        let gameOver = false;
        let difficulty = 1;

        // Jugador (avión)
        const player = { x: 370, y: 480, width: 60, height: 50, speed: 6 };

        let bullets = [];
        let missiles = [];
        let enemies = [];      // Aviones enemigos
        let explosions = [];
        let keys = {};

        // Sonidos simples con Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = 'sine', volume = 0.3) {
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.value = freq;
            gain.gain.value = volume;
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.start();
            setTimeout(() => oscillator.stop(), duration);
        }

        // Controles
        window.addEventListener("keydown", e => {
            keys[e.key] = true;
            if (e.key === " " && !gameOver) {
                shoot();
                playSound(800, 80, 'square', 0.4); // sonido de disparo
            }
            if (e.key.toLowerCase() === "r" && gameOver) resetGame();
        });
        window.addEventListener("keyup", e => keys[e.key] = false);

        function shoot() {
            bullets.push({
                x: player.x + player.width/2 - 4,
                y: player.y - 10,
                width: 8,
                height: 25,
                speed: 12
            });
        }

        // Crear misil enemigo
        function createMissile(x, y, speed = 4) {
            missiles.push({
                x: x,
                y: y,
                width: 18,
                height: 38,
                speed: speed
            });
        }

        // Crear avión enemigo
        function createEnemy() {
            const side = Math.random() < 0.5 ? -40 : canvas.width + 40;
            enemies.push({
                x: side,
                y: 50 + Math.random() * 200,
                width: 55,
                height: 40,
                speed: 2.5 + Math.random() * 1.5,
                direction: side < 0 ? 1 : -1,
                shootTimer: Math.random() * 80 + 40
            });
        }

        function createExplosion(x, y, size = 1) {
            explosions.push({
                x: x,
                y: y,
                size: size,
                life: 25,
                particles: []
            });
            // Sonido de explosión
            playSound(120, 300, 'sawtooth', 0.6);
            setTimeout(() => playSound(60, 400, 'sawtooth', 0.4), 100);
        }

        function update() {
            if (gameOver) return;

            // Movimiento jugador
            if (keys["ArrowLeft"] && player.x > 10) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < canvas.width - player.width - 10) player.x += player.speed;
            if (keys["ArrowUp"] && player.y > 10) player.y -= player.speed;
            if (keys["ArrowDown"] && player.y < canvas.height - player.height - 10) player.y += player.speed;

            // Actualizar balas
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < -30) bullets.splice(i, 1);
            }

            // Actualizar misiles
            for (let i = missiles.length - 1; i >= 0; i--) {
                missiles[i].y += missiles[i].speed;

                // Colisión jugador - misil
                if (checkCollision(player, missiles[i])) {
                    lives--;
                    livesEl.textContent = lives;
                    createExplosion(player.x + player.width/2, player.y + player.height/2, 1.5);
                    missiles.splice(i, 1);
                    if (lives <= 0) endGame();
                    continue;
                }

                if (missiles[i].y > canvas.height) missiles.splice(i, 1);
            }

            // Actualizar aviones enemigos
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.speed * e.direction;

                e.shootTimer--;
                if (e.shootTimer <= 0) {
                    createMissile(e.x + e.width/2 - 8, e.y + e.height, 3.5 + difficulty * 0.5);
                    e.shootTimer = 70 + Math.random() * 50;
                }

                if (e.x < -60 || e.x > canvas.width + 60) enemies.splice(i, 1);
            }

            // Colisiones bala - misil y bala - enemigo
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];

                // Contra misiles
                for (let j = missiles.length - 1; j >= 0; j--) {
                    if (checkCollision(b, missiles[j])) {
                        createExplosion(missiles[j].x + 10, missiles[j].y + 15);
                        bullets.splice(i, 1);
                        missiles.splice(j, 1);
                        score += 10;
                        scoreEl.textContent = score;
                        break;
                    }
                }
                if (i < 0) continue;

                // Contra aviones enemigos
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (checkCollision(b, enemies[j])) {
                        createExplosion(enemies[j].x + enemies[j].width/2, enemies[j].y + enemies[j].height/2, 1.2);
                        bullets.splice(i, 1);
                        enemies.splice(j, 1);
                        score += 25;
                        scoreEl.textContent = score;
                        break;
                    }
                }
            }

            // Actualizar explosiones
            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].life--;
                if (explosions[i].life <= 0) explosions.splice(i, 1);
            }

            // Dificultad progresiva
            difficulty = 1 + Math.floor(score / 150) * 0.3;

            // Generar enemigos y misiles
            if (Math.random() < 0.018 + difficulty * 0.008) createEnemy();
            if (Math.random() < 0.035 + difficulty * 0.015) {
                createMissile(Math.random() * (canvas.width - 30), -40, 3 + difficulty * 1.2);
            }
        }

        function checkCollision(a, b) {
            return !(
                a.x + a.width < b.x ||
                b.x + b.width < a.x ||
                a.y + a.height < b.y ||
                b.y + b.height < a.y
            );
        }

        function drawPlane(x, y, color = "#00ff00") {
            ctx.fillStyle = color;
            ctx.fillRect(x+15, y, 30, 35);           // cuerpo
            ctx.fillRect(x+25, y-12, 12, 18);        // cabina
            ctx.fillRect(x, y+18, 18, 12);           // ala izquierda
            ctx.fillRect(x+42, y+18, 18, 12);        // ala derecha
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(x+27, y+8, 6, 8);           // ventana
        }

        function drawMissile(x, y) {
            ctx.fillStyle = "#ff2222";
            ctx.fillRect(x+4, y, 12, 32);
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(x+6, y-8, 8, 12);   // punta
            ctx.fillStyle = "#ff8800";
            ctx.fillRect(x+7, y+25, 6, 8);   // fuego
        }

        function drawExplosion(exp) {
            const alpha = exp.life / 25;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = `hsl(${Math.random()*40}, 100%, 60%)`;
            const s = exp.size * (30 + Math.sin(exp.life) * 8);
            ctx.fillRect(exp.x - s/2, exp.y - s/2, s, s);
            ctx.globalAlpha = 1;
        }

        function draw() {
            // Fondo cielo oscuro
            ctx.fillStyle = "#001122";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Algunas estrellas
            ctx.fillStyle = "white";
            for (let i = 0; i < 40; i++) {
                const x = (i * 73) % canvas.width;
                const y = (i * 37) % (canvas.height * 0.6);
                ctx.fillRect(x, y, 2, 2);
            }

            // Dibujar jugador
            drawPlane(player.x, player.y, "#00ff88");

            // Balas (láser)
            ctx.fillStyle = "#00ffff";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

            // Misiles
            missiles.forEach(m => drawMissile(m.x, m.y));

            // Aviones enemigos
            enemies.forEach(e => drawPlane(e.x, e.y, "#ff4444"));

            // Explosiones
            explosions.forEach(drawExplosion);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameOver = true;
            createExplosion(player.x + 30, player.y + 25, 2);
            gameOverScreen.style.display = "block";
            finalScoreEl.textContent = score;
        }

        function resetGame() {
            score = 0;
            lives = 3;
            difficulty = 1;
            bullets = [];
            missiles = [];
            enemies = [];
            explosions = [];
            player.x = 370;
            player.y = 480;
            gameOver = false;
            gameOverScreen.style.display = "none";
            scoreEl.textContent = "0";
            livesEl.textContent = "3";
        }

        // Iniciar
        resetGame();
        gameLoop();
    </script>
</body>
</html>
