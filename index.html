<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ Avión vs Misiles</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 100vh;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: lime;
            font-size: 22px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 5px black;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 52px;
            text-align: center;
            display: none;
            z-index: 20;
            text-shadow: 0 0 15px red;
        }
        .touch-btn {
            position: absolute;
            background: rgba(255,255,255,0.18);
            color: white;
            font-size: 32px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            user-select: none;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div id="ui">
        Puntaje: <span id="score">0</span> &nbsp;&nbsp;&nbsp; 
        Vidas: <span id="lives">3</span>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div id="gameOver">
        GAME OVER<br>
        <span style="font-size:36px">Puntaje final: <span id="finalScore">0</span></span><br><br>
        Toca la pantalla o presiona R para jugar de nuevo
    </div>

    <!-- Botón de disparo -->
    <div id="shootBtn" class="touch-btn" style="bottom: 40px; right: 30px;">🔫</div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        
        const scoreEl = document.getElementById("score");
        const livesEl = document.getElementById("lives");
        const gameOverScreen = document.getElementById("gameOver");
        const finalScoreEl = document.getElementById("finalScore");
        const shootBtn = document.getElementById("shootBtn");

        let score = 0;
        let lives = 3;
        let gameOver = false;
        let difficulty = 1;

        const player = { x: 370, y: 480, width: 60, height: 50, speed: 7 };

        let bullets = [];
        let missiles = [];
        let enemies = [];
        let explosions = [];
        let keys = {};

        // Joystick táctil
        let isTouching = false;
        let touchX = 0, touchY = 0;
        let joystickActive = false;
        const joystickX = 140;
        const joystickY = 470;
        const joystickRadius = 75;   // Más grande y fácil de usar

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = 'sine', volume = 0.3) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.value = volume;
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                setTimeout(() => osc.stop(), duration);
            } catch(e) {}
        }

        // ====================== CONTROLES ======================
        // Teclado
        window.addEventListener("keydown", e => {
            keys[e.key] = true;
            if (e.key === " " && !gameOver) shoot();
            if (e.key.toLowerCase() === "r" && gameOver) resetGame();
        });
        window.addEventListener("keyup", e => keys[e.key] = false);

        // Touch
        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return {
                x: (touch.clientX - rect.left) * (canvas.width / rect.width),
                y: (touch.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        canvas.addEventListener("touchstart", e => {
            e.preventDefault();
            if (gameOver) {
                resetGame();
                return;
            }
            const pos = getTouchPos(e);
            touchX = pos.x;
            touchY = pos.y;
            isTouching = true;

            // Activar joystick si tocan cerca
            if (Math.hypot(pos.x - joystickX, pos.y - joystickY) < joystickRadius * 1.6) {
                joystickActive = true;
            }
        });

        canvas.addEventListener("touchmove", e => {
            e.preventDefault();
            if (!isTouching || gameOver) return;
            const pos = getTouchPos(e);
            touchX = pos.x;
            touchY = pos.y;
        });

        canvas.addEventListener("touchend", () => {
            isTouching = false;
            joystickActive = false;
        });

        // Botón disparo
        shootBtn.addEventListener("touchstart", e => {
            e.preventDefault();
            if (!gameOver) shoot();
        });
        shootBtn.addEventListener("mousedown", () => { if (!gameOver) shoot(); });

        function shoot() {
            bullets.push({
                x: player.x + player.width/2 - 4,
                y: player.y - 10,
                width: 8,
                height: 25,
                speed: 13
            });
            playSound(820, 70, 'square', 0.35);
        }

        // ====================== JUEGO ======================
        function createMissile(x, y, speed = 4.5) {
            missiles.push({ x, y, width: 18, height: 38, speed });
        }

        function createEnemy() {
            const fromLeft = Math.random() < 0.5;
            enemies.push({
                x: fromLeft ? -50 : canvas.width + 50,
                y: 60 + Math.random() * 180,
                width: 55,
                height: 40,
                speed: 2.8 + Math.random() * 1.8,
                direction: fromLeft ? 1 : -1,
                shootTimer: 40 + Math.random() * 60
            });
        }

        function createExplosion(x, y, size = 1) {
            explosions.push({ x, y, size, life: 28 });
            playSound(150, 280, 'sawtooth', 0.7);
            setTimeout(() => playSound(70, 350, 'sawtooth', 0.4), 80);
        }

        function checkCollision(a, b) {
            return !(
                a.x + a.width < b.x || b.x + b.width < a.x ||
                a.y + a.height < b.y || b.y + b.height < a.y
            );
        }

        function drawPlane(x, y, color = "#00ff88") {
            ctx.fillStyle = color;
            ctx.fillRect(x + 15, y, 30, 35);
            ctx.fillRect(x + 25, y - 15, 12, 20);
            ctx.fillRect(x + 5, y + 18, 20, 12);
            ctx.fillRect(x + 35, y + 18, 20, 12);
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(x + 27, y + 6, 7, 10);
        }

        function drawMissile(x, y) {
            ctx.fillStyle = "#ff2222";
            ctx.fillRect(x + 4, y, 12, 34);
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(x + 6, y - 10, 8, 14);
            ctx.fillStyle = "#ff8800";
            ctx.fillRect(x + 7, y + 28, 6, 10);
        }

        function drawExplosion(exp) {
            const alpha = exp.life / 28;
            ctx.globalAlpha = alpha * 0.9;
            const s = exp.size * (25 + Math.sin(exp.life * 0.8) * 12);
            ctx.fillStyle = `hsl(30, 100%, 65%)`;
            ctx.fillRect(exp.x - s/2, exp.y - s/2, s, s);
            ctx.globalAlpha = 1;
        }

        function update() {
            if (gameOver) return;

            // === MOVIMIENTO TECLADO ===
            if (keys["ArrowLeft"] && player.x > 10) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < canvas.width - player.width - 10) player.x += player.speed;
            if (keys["ArrowUp"] && player.y > 10) player.y -= player.speed;
            if (keys["ArrowDown"] && player.y < canvas.height - player.height - 10) player.y += player.speed;

            // === MOVIMIENTO JOYSTICK TÁCTIL (MEJORADO) ===
            if (joystickActive && isTouching) {
                const dx = touchX - joystickX;
                const dy = touchY - joystickY;
                const dist = Math.hypot(dx, dy);

                if (dist > 15) {                    // Umbral más bajo = más sensible
                    const moveSpeed = player.speed * 1.05;
                    player.x += (dx / dist) * moveSpeed;
                    player.y += (dy / dist) * moveSpeed * 0.85; // menos sensible verticalmente
                }
            }

            // Limitar jugador dentro de la pantalla
            player.x = Math.max(15, Math.min(canvas.width - player.width - 15, player.x));
            player.y = Math.max(20, Math.min(canvas.height - player.height - 20, player.y));

            // Actualizar balas, misiles, enemigos...
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < -30) bullets.splice(i, 1);
            }

            for (let i = missiles.length - 1; i >= 0; i--) {
                missiles[i].y += missiles[i].speed;

                if (checkCollision(player, missiles[i])) {
                    lives--;
                    livesEl.textContent = lives;
                    createExplosion(player.x + 30, player.y + 25, 1.6);
                    missiles.splice(i, 1);
                    if (lives <= 0) endGame();
                    continue;
                }
                if (missiles[i].y > canvas.height + 50) missiles.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.speed * e.direction;
                e.shootTimer--;

                if (e.shootTimer <= 0) {
                    createMissile(e.x + e.width/2 - 8, e.y + e.height, 4.2 + difficulty * 0.6);
                    e.shootTimer = 45 + Math.random() * 65;
                }
                if (e.x < -80 || e.x > canvas.width + 80) enemies.splice(i, 1);
            }

            // Colisiones
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                for (let j = missiles.length - 1; j >= 0; j--) {
                    if (checkCollision(b, missiles[j])) {
                        createExplosion(missiles[j].x + 9, missiles[j].y + 18);
                        bullets.splice(i, 1);
                        missiles.splice(j, 1);
                        score += 10;
                        scoreEl.textContent = score;
                        break;
                    }
                }
                if (i < 0) continue;

                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (checkCollision(b, enemies[j])) {
                        createExplosion(enemies[j].x + 27, enemies[j].y + 20, 1.3);
                        bullets.splice(i, 1);
                        enemies.splice(j, 1);
                        score += 30;
                        scoreEl.textContent = score;
                        break;
                    }
                }
            }

            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].life--;
                if (explosions[i].life <= 0) explosions.splice(i, 1);
            }

            difficulty = 1 + Math.floor(score / 200) * 0.35;

            // Generación
            if (Math.random() < 0.023 + difficulty * 0.013) createEnemy();
            if (Math.random() < 0.04 + difficulty * 0.02) {
                createMissile(Math.random() * (canvas.width - 40), -40, 3.8 + difficulty);
            }
        }

        function draw() {
            ctx.fillStyle = "#001122";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrellas
            ctx.fillStyle = "#ffffff";
            for (let i = 0; i < 45; i++) {
                ctx.fillRect((i*67)%canvas.width, (i*41)%380, 1.5, 1.5);
            }

            drawPlane(player.x, player.y, "#00ff88");
            bullets.forEach(b => {
                ctx.fillStyle = "#00ffff";
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });
            missiles.forEach(m => drawMissile(m.x, m.y));
            enemies.forEach(e => drawPlane(e.x, e.y, "#ff5555"));
            explosions.forEach(drawExplosion);

            // Joystick
            if (joystickActive) {
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.lineWidth = 12;
                ctx.beginPath();
                ctx.arc(joystickX, joystickY, joystickRadius, 0, Math.PI * 2);
                ctx.stroke();

                const dx = touchX - joystickX;
                const dy = touchY - joystickY;
                const dist = Math.min(Math.hypot(dx, dy), joystickRadius);
                const angle = Math.atan2(dy, dx);
                const stickX = joystickX + Math.cos(angle) * dist;
                const stickY = joystickY + Math.sin(angle) * dist;

                ctx.fillStyle = "rgba(255,255,255,0.6)";
                ctx.beginPath();
                ctx.arc(stickX, stickY, 30, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function endGame() {
            gameOver = true;
            createExplosion(player.x + 30, player.y + 25, 2);
            gameOverScreen.style.display = "block";
            finalScoreEl.textContent = score;
        }

        function resetGame() {
            score = 0;
            lives = 3;
            difficulty = 1;
            bullets = [];
            missiles = [];
            enemies = [];
            explosions = [];
            player.x = 370;
            player.y = 480;
            gameOver = false;
            gameOverScreen.style.display = "none";
            scoreEl.textContent = "0";
            livesEl.textContent = "3";
        }

        // Iniciar
        resetGame();
        gameLoop();

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
