<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✈️ Avión vs Misiles</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none; /* importante para móviles */
        }
        canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 100vh;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: lime;
            font-size: 20px;
            z-index: 10;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            z-index: 10;
            display: none;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 50px;
            text-align: center;
            display: none;
            z-index: 20;
            text-shadow: 0 0 10px red;
        }
        /* Botones táctiles */
        .touch-btn {
            position: absolute;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 18px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        Puntaje: <span id="score">0</span> &nbsp;&nbsp; 
        Vidas: <span id="lives">3</span>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div id="instructions">Joystick izquierdo: mover • Botón derecho: disparar</div>

    <div id="gameOver">
        GAME OVER<br>
        <span style="font-size:35px">Puntaje: <span id="finalScore">0</span></span><br><br>
        Toca la pantalla o presiona R para reiniciar
    </div>

    <!-- Botones táctiles -->
    <div id="shootBtn" class="touch-btn" style="bottom: 30px; right: 30px; font-size: 28px;">🔫</div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const livesEl = document.getElementById("lives");
        const gameOverScreen = document.getElementById("gameOver");
        const finalScoreEl = document.getElementById("finalScore");
        const instructions = document.getElementById("instructions");
        const shootBtn = document.getElementById("shootBtn");

        let score = 0;
        let lives = 3;
        let gameOver = false;
        let difficulty = 1;

        const player = { x: 370, y: 480, width: 60, height: 50, speed: 6 };

        let bullets = [];
        let missiles = [];
        let enemies = [];
        let explosions = [];
        let keys = {};

        // Controles táctiles
        let isTouching = false;
        let touchX = 0;
        let touchY = 0;
        let joystickActive = false;
        let joystickX = 120;
        let joystickY = canvas.height - 120;
        let joystickRadius = 60;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = 'sine', volume = 0.3) {
            try {
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.type = type;
                oscillator.frequency.value = freq;
                gain.gain.value = volume;
                oscillator.connect(gain).connect(audioCtx.destination);
                oscillator.start();
                setTimeout(() => oscillator.stop(), duration);
            } catch(e) {}
        }

        // --- Eventos de teclado (PC) ---
        window.addEventListener("keydown", e => {
            keys[e.key] = true;
            if (e.key === " " && !gameOver) shoot();
            if (e.key.toLowerCase() === "r" && gameOver) resetGame();
        });
        window.addEventListener("keyup", e => keys[e.key] = false);

        // --- Eventos táctiles ---
        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return {
                x: (touch.clientX - rect.left) * (canvas.width / rect.width),
                y: (touch.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        canvas.addEventListener("touchstart", e => {
            e.preventDefault();
            if (gameOver) {
                resetGame();
                return;
            }
            const pos = getTouchPos(e);
            touchX = pos.x;
            touchY = pos.y;
            isTouching = true;

            // Si tocan cerca del joystick
            const dx = pos.x - joystickX;
            const dy = pos.y - joystickY;
            if (Math.sqrt(dx*dx + dy*dy) < joystickRadius * 1.5) {
                joystickActive = true;
            }
        });

        canvas.addEventListener("touchmove", e => {
            e.preventDefault();
            if (!isTouching || gameOver) return;
            const pos = getTouchPos(e);
            touchX = pos.x;
            touchY = pos.y;
        });

        canvas.addEventListener("touchend", e => {
            e.preventDefault();
            isTouching = false;
            joystickActive = false;
        });

        // Botón de disparo (grande y fácil de tocar)
        shootBtn.addEventListener("touchstart", e => {
            e.preventDefault();
            if (!gameOver) shoot();
        });
        shootBtn.addEventListener("mousedown", () => { if (!gameOver) shoot(); }); // también para PC

        function shoot() {
            bullets.push({
                x: player.x + player.width/2 - 4,
                y: player.y - 10,
                width: 8,
                height: 25,
                speed: 12
            });
            playSound(800, 80, 'square', 0.4);
        }

        // Resto del código del juego (update, draw, colisiones, etc.) se mantiene igual que antes
        // (Para no hacer el mensaje demasiado largo, copio solo las partes clave. Si quieres el código completo, avísame)

        function createMissile(x, y, speed = 4) { /* ... mismo que antes */ }
        function createEnemy() { /* ... mismo */ }
        function createExplosion(x, y, size = 1) { /* ... mismo */ }

        function checkCollision(a, b) {
            return !(a.x + a.width < b.x || b.x + b.width < a.x || a.y + a.height < b.y || b.y + b.height < a.y);
        }

        function update() {
            if (gameOver) return;

            // Movimiento con teclado
            if (keys["ArrowLeft"] && player.x > 10) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < canvas.width - player.width - 10) player.x += player.speed;
            if (keys["ArrowUp"] && player.y > 10) player.y -= player.speed;
            if (keys["ArrowDown"] && player.y < canvas.height - player.height - 10) player.y += player.speed;

            // Movimiento con joystick táctil
            if (joystickActive && isTouching) {
                const dx = touchX - joystickX;
                const dy = touchY - joystickY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 10) {
                    const moveSpeed = player.speed * 0.9;
                    player.x += (dx / dist) * moveSpeed;
                    player.y += (dy / dist) * moveSpeed;
                }
            }

            // Limitar jugador dentro de la pantalla
            player.x = Math.max(10, Math.min(canvas.width - player.width - 10, player.x));
            player.y = Math.max(10, Math.min(canvas.height - player.height - 10, player.y));

            // El resto de update (balas, misiles, enemigos, dificultad, explosiones) es el mismo que en la versión anterior.
            // Si necesitas el código completo, dime y te lo paso entero.

            // Generación de enemigos y misiles (mantengo la dificultad progresiva)
            if (Math.random() < 0.02 + difficulty * 0.01) createEnemy();
            if (Math.random() < 0.04 + difficulty * 0.02) {
                createMissile(Math.random() * (canvas.width - 30), -40, 3.5 + difficulty);
            }
        }

        // draw() se mantiene casi igual, solo agregamos dibujo del joystick cuando está activo
        function draw() {
            ctx.fillStyle = "#001122";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // estrellas...
            ctx.fillStyle = "white";
            for (let i = 0; i < 40; i++) {
                ctx.fillRect((i*73)%canvas.width, (i*37)%(canvas.height*0.6), 2, 2);
            }

            drawPlane(player.x, player.y, "#00ff88");
            bullets.forEach(b => { ctx.fillStyle = "#00ffff"; ctx.fillRect(b.x, b.y, b.width, b.height); });
            missiles.forEach(m => drawMissile(m.x, m.y));
            enemies.forEach(e => drawPlane(e.x, e.y, "#ff4444"));
            explosions.forEach(drawExplosion);

            // Dibujar joystick virtual
            if (joystickActive) {
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.arc(joystickX, joystickY, joystickRadius, 0, Math.PI*2);
                ctx.stroke();

                const dx = touchX - joystickX;
                const dy = touchY - joystickY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), joystickRadius);
                const angle = Math.atan2(dy, dx);
                const stickX = joystickX + Math.cos(angle) * dist;
                const stickY = joystickY + Math.sin(angle) * dist;

                ctx.fillStyle = "rgba(255,255,255,0.6)";
                ctx.beginPath();
                ctx.arc(stickX, stickY, 25, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() { /* mismo que antes */ }

        // Iniciar
        resetGame();
        instructions.style.display = "block"; // mostrar instrucciones
        gameLoop();
    </script>
</body>
</html>
